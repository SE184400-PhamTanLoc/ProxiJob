syntax = "proto3";

option csharp_namespace = "ProxiJob.Shared.Contract.Protos";

package identityservice;

// Identity — gRPC nội bộ cho Job / Management / Matching...
service IdentityGrpcService {
  // Job: lấy CV URL + snapshot hồ sơ sinh viên khi apply ca.
  rpc GetStudentCvForApplication (GetStudentCvForApplicationRequest) returns (GetStudentCvForApplicationResponse);

  // Các service khác: lấy context user theo id (sau khi đã biết userId).
  rpc GetUserContext (GetUserContextRequest) returns (GetUserContextResponse);

  // Các service khác: validate JWT từ client (sau login) → trả context user.
  rpc ValidateAccessToken (ValidateAccessTokenRequest) returns (GetUserContextResponse);

  // Cập nhật reputation cho sinh viên
  rpc UpdateStudentReputation (UpdateStudentReputationRequest) returns (UpdateStudentReputationResponse);

  // Cập nhật reputation cho chủ quán
  rpc UpdateBusinessReputation (UpdateBusinessReputationRequest) returns (UpdateBusinessReputationResponse);
}

message GetStudentCvForApplicationRequest {
  int32 student_id = 1;
}

message GetStudentCvForApplicationResponse {
  bool found = 1;
  string cv_url = 2;
  StudentProfileGrpcDto profile = 3;
}

message GetUserContextRequest {
  int32 user_id = 1;
}

message ValidateAccessTokenRequest {
  string access_token = 1;
}

message GetUserContextResponse {
  bool found = 1;
  UserContextGrpcDto user = 2;
}

message UserContextGrpcDto {
  int32 user_id = 1;
  int32 business_id = 2;
  string email = 3;
  string full_name = 4;
  string phone_number = 5;
  string avatar_url = 6;
  string role = 7;
  string subscription_tier = 8;
  int32 job_post_limit = 9;
  int32 job_posts_used = 10;
  string profile_status = 11;
  double reputation_score = 12;
  bool is_active = 13;
  repeated string features = 14;
}

message StudentProfileGrpcDto {
  int32 user_id = 1;
  string full_name = 2;
  string email = 3;
  string phone_number = 4;
  string avatar_url = 5;
  string readiness_status = 6;
  string school = 7;
  string major = 8;
  int32 year_of_study = 9;
  string bio = 10;
  string skills = 11;
  double reputation_score = 12;
  int32 review_count = 13;
  int32 completion_percent = 14;
}

message UpdateStudentReputationRequest {
  int32 user_id = 1;
  double rating = 2;
  string comment = 3;
}

message UpdateStudentReputationResponse {
  bool success = 1;
}

message UpdateBusinessReputationRequest {
  int32 user_id = 1;
  double rating = 2;
  string comment = 3;
}

message UpdateBusinessReputationResponse {
  bool success = 1;
}
